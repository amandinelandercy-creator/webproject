<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - Découvrir Bruxelles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Découvrir Bruxelles</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <h2>Contactez-nous</h2>
        <form id="contact-form">
            <label for="contact-nom">Nom :</label><br>
            <input type="text" id="contact-nom" name="nom" required><br>
            <label for="contact-email">Email :</label><br>
            <input type="email" id="contact-email" name="email" required><br>
            <label for="contact-message">Message :</label><br>
            <textarea id="contact-message" name="message" required></textarea><br>
            <button type="submit">Envoyer</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 découvrir bruxelles</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
